<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
    }

    #top { top:10px; }

    button.active {
      background:limegreen;
      color:white;
    }

    #dashboard {
      position:absolute;
      bottom:10px;
      left:10px;
      z-index:1000;
      background:black;
      color:white;
      padding:10px;
      border-radius:10px;
    }

    .leaflet-div-icon {
      background:transparent !important;
      border:none !important;
    }

    .boat {
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-bottom:20px solid red;
    }

    .start {
      width:14px;
      height:14px;
      background:#00ff00;
      border:2px solid white;
      border-radius:50%;
    }

    .leaflet-control-zoom {
      bottom:20px;
      right:10px;
      left:auto !important;
      top:auto !important;
    }

    /* COMPASS */
    #compass {
      position:absolute;
      top:10px;
      right:10px;
      width:90px;
      height:90px;
      z-index:1000;
    }

    #compassFace {
      width:100%;
      height:100%;
      border-radius:50%;
      background:rgba(0,0,0,0.8);
      border:2px solid white;
      position:relative;
    }

    .dir {
      position:absolute;
      color:white;
      font-size:12px;
      font-weight:bold;
    }

    .north { top:2px; left:50%; transform:translateX(-50%); }
    .south { bottom:2px; left:50%; transform:translateX(-50%); }
    .east { right:4px; top:50%; transform:translateY(-50%); }
    .west { left:4px; top:50%; transform:translateY(-50%); }

    #needle {
      position:absolute;
      top:50%;
      left:50%;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-bottom:30px solid red;
      transform-origin:50% 90%;
      transform:translate(-50%, -90%);
    }

  </style>
</head>

<body>

<div id="top" class="panel">
  <button onclick="startGPS()">📍 GPS</button>
  <button id="followBtn" onclick="toggleFollow()">🎯 Follow</button>
  <button onclick="toggleDark()">🌊 Dark</button>
  <button onclick="clearRoute()">❌ Clear</button>
</div>

<div id="dashboard">
  Speed: 0<br>
  Heading: 0°<br>
  Distance: 0 km<br>
  ETA: --
</div>

<div id="compass">
  <div id="compassFace">
    <div class="dir north">N</div>
    <div class="dir east">E</div>
    <div class="dir south">S</div>
    <div class="dir west">W</div>
    <div id="needle"></div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// MAP
var light = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png');

var map = L.map('map',{center:[-33.9,18.4],zoom:7,layers:[light]});
map.zoomControl.setPosition('bottomright');

// STATE
var follow=false, darkMode=false;

// ICONS
var boatIcon=L.divIcon({html:'<div class="boat" id="boat"></div>',iconSize:[20,20],className:''});
var startIcon=L.divIcon({html:'<div class="start"></div>',iconSize:[14,14],className:''});
var finishIcon=L.divIcon({html:'🚩',iconSize:[20,20],className:''});

// DATA
var gpsMarker=null, watchID=null, speed=0, heading=0;
var routePoints=[], routeLine=null, startMarker=null, endMarker=null;

// ===== TRACK STORAGE =====
var trackPoints = JSON.parse(localStorage.getItem("track") || "[]");
var trackLine = null;

// LOAD EXISTING TRACK
if(trackPoints.length > 1){
  trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);
}

// GPS
function startGPS(){

if(watchID){
navigator.geolocation.clearWatch(watchID);
watchID=null;
}

watchID = navigator.geolocation.watchPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

speed = pos.coords.speed ? pos.coords.speed*3.6 : 0;
heading = pos.coords.heading ? pos.coords.heading : 0;

// BOAT
if(!gpsMarker){
gpsMarker=L.marker([lat,lon],{icon:boatIcon}).addTo(map);
map.setView([lat,lon],13);
}else{
gpsMarker.setLatLng([lat,lon]);
}

// ROTATE
document.getElementById("boat").style.transform="rotate("+heading+"deg)";
document.getElementById("needle").style.transform="translate(-50%, -90%) rotate("+heading+"deg)";

// FOLLOW
if(follow){
map.setView([lat,lon], map.getZoom(), {animate:true});
}

// ===== TRACK SAVE =====
var point=[lat,lon];
trackPoints.push(point);
localStorage.setItem("track", JSON.stringify(trackPoints));

// redraw track
if(trackLine) map.removeLayer(trackLine);
trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);

updateDashboard();

},{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
});

}

// ROUTE
map.on('click',function(e){

routePoints.push(e.latlng);

if(routeLine) map.removeLayer(routeLine);
routeLine=L.polyline(routePoints,{color:'cyan'}).addTo(map);

if(routePoints.length===1){
startMarker=L.marker(e.latlng,{icon:startIcon}).addTo(map);
}

if(routePoints.length>1){
if(endMarker) map.removeLayer(endMarker);
endMarker=L.marker(e.latlng,{icon:finishIcon}).addTo(map);
}

updateDashboard();
});

// DIST
function calcDist(p){
var t=0;
for(var i=1;i<p.length;i++) t+=map.distance(p[i-1],p[i]);
return t/1000;
}

// DASH
function updateDashboard(){

var d=0, eta="--";

if(routePoints.length>1){
d=calcDist(routePoints);
eta=speed>1?Math.round((d/speed)*60)+" min":"0 speed";
}

document.getElementById("dashboard").innerHTML=
"Speed: "+speed.toFixed(1)+" km/h<br>"+
"Heading: "+Math.round(heading)+"°<br>"+
"Distance: "+d.toFixed(2)+" km<br>"+
"ETA: "+eta;
}

// CLEAR ROUTE ONLY
function clearRoute(){
routePoints=[];
if(routeLine) map.removeLayer(routeLine);
if(startMarker) map.removeLayer(startMarker);
if(endMarker) map.removeLayer(endMarker);
updateDashboard();
}

// FOLLOW
function toggleFollow(){
follow=!follow;
document.getElementById("followBtn").classList.toggle("active", follow);
}

// DARK
function toggleDark(){
darkMode=!darkMode;
if(darkMode){map.removeLayer(light);map.addLayer(dark);}
else{map.removeLayer(dark);map.addLayer(light);}
}

</script>

</body>
</html>
