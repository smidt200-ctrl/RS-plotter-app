<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
    }

    #mode { top:10px; }
  </style>
</head>

<body>

<div id="mode" class="panel">
  <button onclick="startTracking()">📍 Start GPS</button>
  <button onclick="clearAll()">❌ Clear</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-33.9, 18.4], 7);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== DATA =====
var routePoints = [];
var routeLine;
var startMarker;
var endMarker;
var gpsMarker;
var speed = 0;

// ===== GPS TRACKING =====
function startTracking() {

  navigator.geolocation.watchPosition(function(pos) {

    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    // UPDATE SPEED
    if (pos.coords.speed !== null) {
      speed = pos.coords.speed * 3.6;
    }

    // UPDATE / CREATE GPS MARKER
    if (!gpsMarker) {
      gpsMarker = L.marker([lat, lon]).addTo(map)
        .bindPopup("You are here");
    } else {
      gpsMarker.setLatLng([lat, lon]);
    }

    // CENTER MAP ON YOU
    map.setView([lat, lon], 13);

  }, function(err) {
    alert(err.message);
  }, {
    enableHighAccuracy: true
  });

}

// ===== CLICK TO BUILD ROUTE =====
map.on('click', function(e) {

  routePoints.push(e.latlng);

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(routePoints, {color:'blue'}).addTo(map);

  // START
  if (routePoints.length === 1) {
    startMarker = L.marker(e.latlng).addTo(map)
      .bindPopup("START").openPopup();
  }

  // FINISH + ETA
  if (routePoints.length > 1) {

    if (endMarker) map.removeLayer(endMarker);

    var last = routePoints[routePoints.length - 1];

    var distance = calculateDistance(routePoints);

    var etaText = "No speed";

    if (speed > 1) {
      var eta = distance / speed;
      var minutes = Math.round(eta * 60);
      etaText = minutes + " min";
    }

    endMarker = L.marker(last).addTo(map)
      .bindPopup(
        "FINISH<br>" +
        "Distance: " + distance.toFixed(2) + " km<br>" +
        "Speed: " + speed.toFixed(1) + " km/h<br>" +
        "ETA: " + etaText
      ).openPopup();
  }

});

// ===== DISTANCE =====
function calculateDistance(points) {
  var total = 0;

  for (var i = 1; i < points.length; i++) {
    total += map.distance(points[i-1], points[i]);
  }

  return total / 1000;
}

// ===== CLEAR =====
function clearAll() {
  routePoints = [];

  if (routeLine) map.removeLayer(routeLine);
  if (startMarker) map.removeLayer(startMarker);
  if (endMarker) map.removeLayer(endMarker);
}

</script>

</body>
</html>
