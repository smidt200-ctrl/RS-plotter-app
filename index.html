<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .panel {
      position: absolute;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    #btn { top: 10px; }
    #search { top: 60px; }
    #mode { top: 110px; }
  </style>
</head>

<body>

<div id="btn" class="panel">📍 My Location</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="mode" class="panel">
  <button onclick="setMode('waypoint')">📍 Waypoint</button>
  <button onclick="setMode('route')">🧭 Route</button>
  <button onclick="clearRoute()">❌ Clear</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== INIT MAP =====
var map = L.map('map').setView([-33.9, 18.4], 7);

// ===== OFFLINE LAYER =====
var offline = L.tileLayer('tiles/{z}/{x}/{y}.png', {
  minZoom: 7,
  maxZoom: 9
});

// ===== ONLINE BACKUP =====
var online = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
});

// LOAD BOTH
offline.addTo(map);
online.addTo(map);

// FIX RENDER BUG
setTimeout(function() {
  map.invalidateSize();
}, 1000);

// ===== GPS =====
var marker;

document.getElementById("btn").onclick = function() {

  navigator.geolocation.getCurrentPosition(function(position) {

    var lat = position.coords.latitude;
    var lon = position.coords.longitude;

    if (marker) map.removeLayer(marker);

    marker = L.marker([lat, lon]).addTo(map)
      .bindPopup("You are here")
      .openPopup();

    map.setView([lat, lon], 13);

  }, function(err) {
    alert(err.message);
  });

};

// ===== SEARCH =====
function goToCoords() {
  var input = document.getElementById("coords").value;
  var parts = input.split(",");

  var lat = parseFloat(parts[0]);
  var lon = parseFloat(parts[1]);

  if (isNaN(lat) || isNaN(lon)) {
    alert("Invalid coordinates");
    return;
  }

  L.marker([lat, lon]).addTo(map)
    .bindPopup("Custom point")
    .openPopup();

  map.setView([lat, lon], 13);
}

// ===== MODES =====
var mode = "waypoint";

function setMode(m) {
  mode = m;
}

// ===== WAYPOINT + ROUTE =====
var routePoints = [];
var routeLine;

map.on('click', function(e) {

  if (mode === "waypoint") {
    L.marker(e.latlng).addTo(map)
      .bindPopup("Waypoint")
      .openPopup();
  }

  if (mode === "route") {
    routePoints.push(e.latlng);

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline(routePoints, {color: 'blue'}).addTo(map);
  }

});

// ===== CLEAR ROUTE =====
function clearRoute() {
  routePoints = [];

  if (routeLine) {
    map.removeLayer(routeLine);
  }
}

</script>

</body>
</html>
