<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
      font-size:14px;
    }

    #top { top:10px; }
    #search { top:60px; }

    #dashboard {
      position:absolute;
      bottom:10px;
      left:10px;
      z-index:1000;
      background:black;
      color:white;
      padding:10px;
      border-radius:10px;
    }

    #compass {
      position:absolute;
      top:10px;
      right:10px;
      width:70px;
      height:70px;
      border-radius:50%;
      background:rgba(0,0,0,0.8);
      border:2px solid white;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #compassArrow {
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-bottom:20px solid red;
    }

    .boat {
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-bottom:20px solid red;
    }

    .leaflet-control-zoom {
      bottom:20px;
      right:10px;
      left:auto !important;
      top:auto !important;
    }
  </style>
</head>

<body>

<div id="top" class="panel">
  <button onclick="startTracking()">📍 GPS</button>
  <button onclick="toggleFollow()">🎯 Follow</button>
  <button onclick="toggleDark()">🌊 Dark</button>
  <button onclick="clearRoute()">❌ Clear</button>
</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="dashboard">Speed: 0<br>Heading: 0°<br>Distance: 0 km<br>ETA: --</div>

<div id="compass"><div id="compassArrow"></div></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var lightMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
var darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png');

var map = L.map('map', {
  center: [-33.9, 18.4],
  zoom: 7,
  layers: [lightMap],
  zoomControl:true
});
map.zoomControl.setPosition('bottomright');

// ===== STATE =====
var follow = false;
var dark = false;

// ===== ICONS =====
var boatIcon = L.divIcon({html:'<div class="boat" id="boat"></div>',iconSize:[20,20]});
var startIcon = L.divIcon({html:'🟢',iconSize:[20,20]});
var finishIcon = L.divIcon({html:'🚩',iconSize:[20,20]});

// ===== DATA =====
var gpsMarker, headingLine, speed=0, heading=0;

// ===== ROUTE =====
var routePoints=[], routeLine, startMarker, endMarker;

// ===== GPS =====
function startTracking(){
navigator.geolocation.watchPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

if(pos.coords.speed!=null) speed=pos.coords.speed*3.6;
if(pos.coords.heading!=null) heading=pos.coords.heading;

// BOAT
if(!gpsMarker){
gpsMarker=L.marker([lat,lon],{icon:boatIcon}).addTo(map);
}else{
gpsMarker.setLatLng([lat,lon]);
}

// ROTATION
document.getElementById("boat").style.transform="rotate("+heading+"deg)";
document.getElementById("compassArrow").style.transform="rotate("+heading+"deg)";

// FOLLOW
if(follow) map.setView([lat,lon]);

// HEADING LINE
if(headingLine) map.removeLayer(headingLine);
if(speed>1){
var dest=destinationPoint(lat,lon,heading,speed);
headingLine=L.polyline([[lat,lon],dest],{color:'lime',dashArray:'5,5'}).addTo(map);
}

updateDashboard();

},{enableHighAccuracy:true});
}

// ===== ROUTE CLICK =====
map.on('click',function(e){

routePoints.push(e.latlng);

// DRAW
if(routeLine) map.removeLayer(routeLine);
routeLine=L.polyline(routePoints,{color:'cyan'}).addTo(map);

// START
if(routePoints.length==1){
startMarker=L.marker(e.latlng,{icon:startIcon}).addTo(map);
}

// END
if(routePoints.length>1){
if(endMarker) map.removeLayer(endMarker);
endMarker=L.marker(e.latlng,{icon:finishIcon}).addTo(map);
}

updateDashboard();
});

// ===== DISTANCE =====
function calculateDistance(points){
var total=0;
for(var i=1;i<points.length;i++){
total+=map.distance(points[i-1],points[i]);
}
return total/1000;
}

// ===== DASHBOARD =====
function updateDashboard(){

var dist=0, eta="--";

if(routePoints.length>1){
dist=calculateDistance(routePoints);

if(speed>1){
eta=Math.round((dist/speed)*60)+" min";
}else{
eta="0 speed";
}
}

document.getElementById("dashboard").innerHTML=
"Speed: "+speed.toFixed(1)+" km/h<br>"+
"Heading: "+Math.round(heading)+"°<br>"+
"Distance: "+dist.toFixed(2)+" km<br>"+
"ETA: "+eta;
}

// ===== CLEAR =====
function clearRoute(){
routePoints=[];

if(routeLine) map.removeLayer(routeLine);
if(startMarker) map.removeLayer(startMarker);
if(endMarker) map.removeLayer(endMarker);

updateDashboard();
}

// ===== FOLLOW =====
function toggleFollow(){
follow=!follow;
}

// ===== DARK =====
function toggleDark(){
dark=!dark;

if(dark){
map.removeLayer(lightMap);
map.addLayer(darkMap);
}else{
map.removeLayer(darkMap);
map.addLayer(lightMap);
}
}

// ===== DEST =====
function destinationPoint(lat,lon,brng,distKm){
var R=6371,d=distKm/R;
var lat1=lat*Math.PI/180,lon1=lon*Math.PI/180,brngRad=brng*Math.PI/180;

var lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(brngRad));
var lon2=lon1+Math.atan2(Math.sin(brngRad)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));

return [lat2*180/Math.PI,lon2*180/Math.PI];
}

// ===== SEARCH =====
function goToCoords(){
var input=document.getElementById("coords").value.split(",");
var lat=parseFloat(input[0]),lon=parseFloat(input[1]);
if(!isNaN(lat)&&!isNaN(lon)) map.setView([lat,lon],13);
}

</script>

</body>
</html>
