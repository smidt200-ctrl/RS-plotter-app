<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Plotter Pro+</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;}
#map{height:100vh;width:100vw;}

/* CONTROLS */
#controls{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:8px;
z-index:1000;
background:rgba(0,0,0,0.7);
padding:10px;border-radius:20px;
}

#controls button{
font-size:18px;padding:12px;
border:none;border-radius:12px;
color:white;background:#333;
min-width:50px;
}

#controls button.active{background:limegreen;}

/* DASH */
#dashboard{
position:absolute;top:10px;left:10px;
background:rgba(0,0,0,0.7);
color:white;padding:8px;border-radius:10px;
font-size:13px;z-index:1000;
}

/* COMPASS */
#compass{
position:absolute;top:10px;right:10px;
width:70px;height:70px;
z-index:1000;background:rgba(0,0,0,0.6);
border-radius:50%;
}

#needle{
position:absolute;top:50%;left:50%;
border-left:6px solid transparent;
border-right:6px solid transparent;
border-bottom:20px solid red;
transform-origin:50% 90%;
transform:translate(-50%,-90%);
}

/* ICONS */
.leaflet-div-icon{background:transparent;border:none;}

.boat{
width:0;height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid red;
}

.start{
width:14px;height:14px;
background:#0f0;border:2px solid white;border-radius:50%;
}

/* ZOOM */
.leaflet-control-zoom{
bottom:80px;right:10px;left:auto!important;top:auto!important;
}
</style>
</head>

<body>

<div id="controls">
<button onclick="startGPS()">📍</button>
<button id="followBtn" onclick="toggleFollow()">🎯</button>
<button onclick="toggleCourse()">🧭</button>
<button onclick="toggleSea()">⚓</button>
<button onclick="addWaypoint()">📍+</button>
<button onclick="saveTrip()">💾</button>
<button onclick="clearRoute()">❌</button>
</div>

<div id="dashboard">Speed:0<br>Heading:0<br>Distance:0<br>ETA:--</div>
<div id="compass"><div id="needle"></div></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.0/dist/leaflet-rotate.js"></script>

<script>

// MAP
var light=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
var seamap=L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png');

var map=L.map('map',{
center:[-33.9,18.4],
zoom:7,
layers:[light,seamap],
rotate:true,
bearing:0
});

map.zoomControl.setPosition('bottomright');

// STATE
var follow=false,seaOn=true,courseUp=false;

// ICONS
var boatIcon=L.divIcon({html:'<div class="boat" id="boat"></div>',iconSize:[20,20]});
var startIcon=L.divIcon({html:'<div class="start"></div>',iconSize:[14,14]});
var finishIcon=L.divIcon({html:'🚩',iconSize:[20,20]});

// DATA
var gpsMarker=null,watchID=null,speed=0,heading=0;
var routePoints=[],routeLine=null,startMarker=null,endMarker=null;

// TRACK
var trackPoints=JSON.parse(localStorage.getItem("track")||"[]");
var trackLine=null;

if(trackPoints.length>1){
trackLine=L.polyline(trackPoints,{color:'red'}).addTo(map);
}

// WAYPOINTS (FULL SYSTEM)
var waypoints=JSON.parse(localStorage.getItem("wps")||"[]");
var waypointMarkers=[];

function drawWaypoints(){
waypointMarkers.forEach(m=>map.removeLayer(m));
waypointMarkers=[];

waypoints.forEach((w,i)=>{
var marker=L.marker([w.lat,w.lng]).addTo(map);

marker.bindPopup(
"<b>"+w.name+"</b><br><br>"+
"<button onclick='renameWaypoint("+i+")'>✏️ Rename</button><br><br>"+
"<button onclick='deleteWaypoint("+i+")'>❌ Delete</button>"
);

waypointMarkers.push(marker);
});
}

function addWaypoint(){
if(!gpsMarker) return;

var pos=gpsMarker.getLatLng();
var name=prompt("Waypoint name:");

if(!name) name="Waypoint";

waypoints.push({lat:pos.lat,lng:pos.lng,name:name});
localStorage.setItem("wps",JSON.stringify(waypoints));

drawWaypoints();
}

function renameWaypoint(i){
var newName=prompt("New name:",waypoints[i].name);
if(!newName) return;

waypoints[i].name=newName;
localStorage.setItem("wps",JSON.stringify(waypoints));

drawWaypoints();
}

function deleteWaypoint(i){
waypoints.splice(i,1);
localStorage.setItem("wps",JSON.stringify(waypoints));

drawWaypoints();
}

// HEADING LINE
var headingLine=null;

function updateHeadingLine(lat, lon){

if(headingLine) map.removeLayer(headingLine);

if(speed < 1){ speed = 5; }

var distance=speed*1000;
var rad=heading*Math.PI/180;

var newLat=lat+(distance*Math.cos(rad))/111320;
var newLon=lon+(distance*Math.sin(rad))/(111320*Math.cos(lat*Math.PI/180));

headingLine=L.polyline([[lat,lon],[newLat,newLon]],{color:'yellow'}).addTo(map);

}

// GPS
function startGPS(){

if(watchID!==null){
navigator.geolocation.clearWatch(watchID);
}

watchID=navigator.geolocation.watchPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

speed=pos.coords.speed?pos.coords.speed*3.6:0;
heading=pos.coords.heading||0;

if(!gpsMarker){
gpsMarker=L.marker([lat,lon],{icon:boatIcon}).addTo(map);
map.setView([lat,lon],13);
}else{
gpsMarker.setLatLng([lat,lon]);
}

// rotate
var boat=document.getElementById("boat");
if(boat) boat.style.transform="rotate("+heading+"deg)";

var needle=document.getElementById("needle");
if(needle) needle.style.transform="translate(-50%,-90%) rotate("+heading+"deg)";

// course
if(courseUp){ map.setBearing(heading); }

// follow
if(follow){ map.setView([lat,lon],map.getZoom()); }

// track
var point=[lat,lon];

if(trackPoints.length===0 || map.distance(trackPoints[trackPoints.length-1],point)>3){
trackPoints.push(point);
localStorage.setItem("track",JSON.stringify(trackPoints));

if(trackLine) map.removeLayer(trackLine);
trackLine=L.polyline(trackPoints,{color:'red'}).addTo(map);
}

// heading
updateHeadingLine(lat,lon);

updateDashboard();

});

}

// ROUTE
map.on('click',function(e){

routePoints.push(e.latlng);

if(routeLine) map.removeLayer(routeLine);
routeLine=L.polyline(routePoints,{color:'cyan'}).addTo(map);

if(routePoints.length===1){
startMarker=L.marker(e.latlng,{icon:startIcon}).addTo(map);
}

if(routePoints.length>1){
if(endMarker) map.removeLayer(endMarker);
endMarker=L.marker(e.latlng,{icon:finishIcon}).addTo(map);
}

updateDashboard();
});

// DASH
function calcDist(p){
var t=0;
for(var i=1;i<p.length;i++) t+=map.distance(p[i-1],p[i]);
return t/1000;
}

function updateDashboard(){
var d=0,eta="--";

if(routePoints.length>1){
d=calcDist(routePoints);
eta=speed>1?Math.round((d/speed)*60)+" min":"0 speed";
}

document.getElementById("dashboard").innerHTML=
"Speed:"+speed.toFixed(1)+" km/h<br>"+
"Heading:"+Math.round(heading)+"°<br>"+
"Distance:"+d.toFixed(2)+" km<br>"+
"ETA:"+eta;
}

// BUTTONS
function clearRoute(){
routePoints=[];
if(routeLine) map.removeLayer(routeLine);
if(startMarker) map.removeLayer(startMarker);
if(endMarker) map.removeLayer(endMarker);
}

function toggleFollow(){
follow=!follow;
document.getElementById("followBtn").classList.toggle("active",follow);
}

function toggleSea(){
seaOn=!seaOn;
seaOn?map.addLayer(seamap):map.removeLayer(seamap);
}

function toggleCourse(){
courseUp=!courseUp;
if(!courseUp) map.setBearing(0);
}

function saveTrip(){
var trips=JSON.parse(localStorage.getItem("trips")||"[]");
trips.push(trackPoints);
localStorage.setItem("trips",JSON.stringify(trips));
alert("Trip saved");
}

// INIT
drawWaypoints();

</script>

</body>
</html>
