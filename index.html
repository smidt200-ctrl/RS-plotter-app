<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .panel {
      position: absolute;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    #btn { top: 10px; }
    #search { top: 60px; }
    #mode { top: 110px; }

    .active {
      background: lightblue;
    }
  </style>
</head>

<body>

<div id="btn" class="panel">📍 My Location</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="mode" class="panel">
  <button id="wpBtn" onclick="setMode('waypoint')">📍 Waypoint</button>
  <button id="rtBtn" onclick="setMode('route')">🧭 Route</button>
  <button onclick="clearAll()">❌ Clear</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([-33.9, 18.4], 7);

var offline = L.tileLayer('tiles/{z}/{x}/{y}.png', {
  minZoom: 7,
  maxZoom: 9
});

var online = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');

offline.addTo(map);
online.addTo(map);

setTimeout(() => map.invalidateSize(), 1000);

// ===== GPS =====
var gpsMarker;

document.getElementById("btn").onclick = function() {
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    if (gpsMarker) map.removeLayer(gpsMarker);

    gpsMarker = L.marker([lat, lon]).addTo(map)
      .bindPopup("You are here").openPopup();

    map.setView([lat, lon], 13);
  });
};

// ===== SEARCH =====
function goToCoords() {
  var input = document.getElementById("coords").value;
  var parts = input.split(",");

  var lat = parseFloat(parts[0]);
  var lon = parseFloat(parts[1]);

  if (isNaN(lat) || isNaN(lon)) {
    alert("Invalid coordinates");
    return;
  }

  var m = L.marker([lat, lon]).addTo(map);
  waypoints.push(m);

  map.setView([lat, lon], 13);
}

// ===== MODES =====
var mode = "waypoint";

function setMode(m) {
  mode = m;

  // visual feedback
  document.getElementById("wpBtn").classList.remove("active");
  document.getElementById("rtBtn").classList.remove("active");

  if (m === "waypoint") {
    document.getElementById("wpBtn").classList.add("active");
  } else {
    document.getElementById("rtBtn").classList.add("active");
  }
}

// ===== WAYPOINTS =====
var waypoints = [];

// ===== ROUTES =====
var routePoints = [];
var routeLine;

// ===== MAP CLICK =====
map.on('click', function(e) {

  if (mode === "waypoint") {
    var m = L.marker(e.latlng).addTo(map)
      .bindPopup("Waypoint");

    waypoints.push(m);
  }

  if (mode === "route") {
    routePoints.push(e.latlng);

    if (routeLine) map.removeLayer(routeLine);

    routeLine = L.polyline(routePoints, {color: 'blue'}).addTo(map);
  }

});

// ===== CLEAR EVERYTHING =====
function clearAll() {

  // remove waypoints
  waypoints.forEach(m => map.removeLayer(m));
  waypoints = [];

  // remove route
  routePoints = [];
  if (routeLine) map.removeLayer(routeLine);

}

</script>

</body>
</html>
