<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
      font-size:14px;
    }

    #top { top:10px; }
    #search { top:60px; }

    #dashboard {
      position:absolute;
      bottom:10px;
      left:10px;
      z-index:1000;
      background:black;
      color:white;
      padding:10px;
      border-radius:10px;
    }

    #compass {
      position:absolute;
      top:10px;
      right:10px;
      width:60px;
      height:60px;
      border:2px solid white;
      border-radius:50%;
      background:rgba(0,0,0,0.7);
      color:white;
      text-align:center;
      line-height:60px;
      font-weight:bold;
      z-index:1000;
    }

    .boat {
      width:0;
      height:0;
      border-left:10px solid transparent;
      border-right:10px solid transparent;
      border-bottom:20px solid red;
      transform-origin: center;
    }
  </style>
</head>

<body>

<div id="top" class="panel">
  <button onclick="startTracking()">📍 Start GPS</button>
  <button onclick="toggleFollow()">🎯 Follow</button>
  <button onclick="toggleDark()">🌊 Dark</button>
</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="dashboard">Speed: 0<br>Heading: 0°<br>Distance: 0 km<br>ETA: --</div>
<div id="compass">N</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var lightMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');
var darkMap = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_dark/{z}/{x}/{y}{r}.png');

var map = L.map('map', {
  center: [-33.9, 18.4],
  zoom: 7,
  layers: [lightMap]
});

// ===== STATE =====
var follow = false;
var dark = false;

// ===== BOAT =====
var boatIcon = L.divIcon({
  html: '<div class="boat" id="boat"></div>',
  iconSize: [20,20],
  className: ''
});

var gpsMarker;
var headingLine;
var speed = 0;
var heading = 0;

// ===== TRACK =====
var trackPoints = [];
var trackLine;

if (localStorage.getItem("track")) {
  trackPoints = JSON.parse(localStorage.getItem("track"));
  trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);
}

// ===== ROUTE =====
var routePoints = [];
var routeLine;

// ===== GPS =====
function startTracking() {

  navigator.geolocation.watchPosition(function(pos) {

    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    if (pos.coords.speed !== null) speed = pos.coords.speed * 3.6;
    if (pos.coords.heading !== null) heading = pos.coords.heading;

    if (!gpsMarker) {
      gpsMarker = L.marker([lat, lon], {icon: boatIcon}).addTo(map);
    } else {
      gpsMarker.setLatLng([lat, lon]);
    }

    // ROTATE BOAT
    var boat = document.getElementById("boat");
    if (boat) boat.style.transform = "rotate(" + heading + "deg)";

    // COMPASS
    document.getElementById("compass").innerHTML = Math.round(heading) + "°";

    // FOLLOW MODE
    if (follow) map.setView([lat, lon], map.getZoom());

    // HEADING LINE
    if (headingLine) map.removeLayer(headingLine);

    if (speed > 1) {
      var dest = destinationPoint(lat, lon, heading, speed);
      headingLine = L.polyline([[lat, lon], dest], {
        color:'lime',
        dashArray:'5,5'
      }).addTo(map);
    }

    // TRACK SAVE
    var point = [lat, lon];
    trackPoints.push(point);
    localStorage.setItem("track", JSON.stringify(trackPoints));

    if (trackLine) map.removeLayer(trackLine);
    trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);

    updateDashboard();

  }, function(err) {
    alert(err.message);
  }, {
    enableHighAccuracy:true
  });
}

// ===== ROUTE =====
map.on('click', function(e) {

  routePoints.push(e.latlng);

  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline(routePoints, {color:'cyan'}).addTo(map);

  updateDashboard();
});

// ===== DISTANCE =====
function calculateDistance(points) {
  var total = 0;
  for (var i=1;i<points.length;i++) {
    total += map.distance(points[i-1], points[i]);
  }
  return total/1000;
}

// ===== DASHBOARD =====
function updateDashboard() {

  var distance = 0;
  var eta = "--";

  if (routePoints.length > 1) {
    distance = calculateDistance(routePoints);

    if (speed > 1) {
      eta = Math.round((distance/speed)*60) + " min";
    } else {
      eta = "0 speed";
    }
  }

  document.getElementById("dashboard").innerHTML =
    "Speed: " + speed.toFixed(1) + " km/h<br>" +
    "Heading: " + Math.round(heading) + "°<br>" +
    "Distance: " + distance.toFixed(2) + " km<br>" +
    "ETA: " + eta;
}

// ===== FOLLOW =====
function toggleFollow() {
  follow = !follow;
  alert("Follow: " + (follow ? "ON" : "OFF"));
}

// ===== DARK MODE =====
function toggleDark() {
  dark = !dark;

  if (dark) {
    map.removeLayer(lightMap);
    map.addLayer(darkMap);
  } else {
    map.removeLayer(darkMap);
    map.addLayer(lightMap);
  }
}

// ===== DESTINATION =====
function destinationPoint(lat, lon, brng, distKm) {
  var R=6371;
  var d=distKm/R;

  var lat1=lat*Math.PI/180;
  var lon1=lon*Math.PI/180;
  var brngRad=brng*Math.PI/180;

  var lat2=Math.asin(
    Math.sin(lat1)*Math.cos(d)+
    Math.cos(lat1)*Math.sin(d)*Math.cos(brngRad)
  );

  var lon2=lon1+Math.atan2(
    Math.sin(brngRad)*Math.sin(d)*Math.cos(lat1),
    Math.cos(d)-Math.sin(lat1)*Math.sin(lat2)
  );

  return [lat2*180/Math.PI, lon2*180/Math.PI];
}

// ===== SEARCH =====
function goToCoords() {
  var input=document.getElementById("coords").value;
  var parts=input.split(",");

  var lat=parseFloat(parts[0]);
  var lon=parseFloat(parts[1]);

  if (isNaN(lat)||isNaN(lon)) {
    alert("Invalid");
    return;
  }

  map.setView([lat,lon],13);
}

</script>

</body>
</html>
