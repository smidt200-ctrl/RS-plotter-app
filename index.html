<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
      font-size:14px;
    }

    #top { top:10px; }
    #search { top:60px; }
  </style>
</head>

<body>

<div id="top" class="panel">
  <button onclick="startTracking()">📍 Start GPS</button>
  <button onclick="clearManual()">❌ Clear Manual</button>
</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([-33.9, 18.4], 7);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== DATA =====
var gpsMarker;
var speed = 0;

// AUTO TRACK (your movement)
var trackPoints = [];
var trackLine;

// MANUAL ROUTE
var routePoints = [];
var routeLine;

// ===== GPS TRACKING =====
function startTracking() {

  navigator.geolocation.watchPosition(function(pos) {

    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    // speed
    if (pos.coords.speed !== null) {
      speed = pos.coords.speed * 3.6;
    }

    // GPS marker
    if (!gpsMarker) {
      gpsMarker = L.marker([lat, lon]).addTo(map)
        .bindPopup("You");
    } else {
      gpsMarker.setLatLng([lat, lon]);
    }

    // ===== AUTO TRACK LINE =====
    var point = [lat, lon];
    trackPoints.push(point);

    if (trackLine) map.removeLayer(trackLine);

    trackLine = L.polyline(trackPoints, {
      color: 'red'
    }).addTo(map);

    map.setView([lat, lon], 13);

  }, function(err) {
    alert(err.message);
  }, {
    enableHighAccuracy: true
  });

}

// ===== MANUAL ROUTE =====
map.on('click', function(e) {

  routePoints.push(e.latlng);

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(routePoints, {
    color:'blue'
  }).addTo(map);

});

// ===== CLEAR ONLY MANUAL =====
function clearManual() {
  routePoints = [];

  if (routeLine) map.removeLayer(routeLine);
}

// ===== SEARCH =====
function goToCoords() {
  var input = document.getElementById("coords").value;
  var parts = input.split(",");

  var lat = parseFloat(parts[0]);
  var lon = parseFloat(parts[1]);

  if (isNaN(lat) || isNaN(lon)) {
    alert("Invalid coordinates");
    return;
  }

  L.marker([lat, lon]).addTo(map);
  map.setView([lat, lon], 13);
}

</script>

</body>
</html>
