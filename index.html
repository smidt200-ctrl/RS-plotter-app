<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; }
    #map { height:100vh; width:100vw; }

    .panel {
      position:absolute;
      left:10px;
      z-index:1000;
      background:white;
      padding:8px;
      border-radius:8px;
      font-size:14px;
    }

    #top { top:10px; }
    #search { top:60px; }

    .boat {
      font-size: 28px;
      transform-origin: center;
    }
  </style>
</head>

<body>

<div id="top" class="panel">
  <button onclick="startTracking()">📍 Start GPS</button>
  <button onclick="clearManual()">❌ Clear Manual</button>
</div>

<div id="search" class="panel">
  <input type="text" id="coords" placeholder="Lat, Lon">
  <button onclick="goToCoords()">Go</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([-33.9, 18.4], 7);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ===== ICONS =====
var boatIcon = L.divIcon({
  html: '<div class="boat" id="boat">🛥️</div>',
  iconSize: [30,30],
  className: ''
});

var startIcon = L.divIcon({
  html: '<div style="font-size:20px;">🟢</div>',
  iconSize: [20,20],
  className: ''
});

var finishIcon = L.divIcon({
  html: '<div style="font-size:20px;">🚩</div>',
  iconSize: [20,20],
  className: ''
});

// ===== DATA =====
var gpsMarker;
var speed = 0;
var heading = 0;

// ===== TRACK =====
var trackPoints = [];
var trackLine;

if (localStorage.getItem("track")) {
  trackPoints = JSON.parse(localStorage.getItem("track"));
  trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);
}

// ===== ROUTE =====
var routePoints = [];
var routeLine;
var startMarker;
var endMarker;

// ===== GPS =====
function startTracking() {

  navigator.geolocation.watchPosition(function(pos) {

    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    if (pos.coords.speed !== null) {
      speed = pos.coords.speed * 3.6;
    }

    if (pos.coords.heading !== null) {
      heading = pos.coords.heading;
    }

    // BOAT
    if (!gpsMarker) {
      gpsMarker = L.marker([lat, lon], {icon: boatIcon}).addTo(map);
    } else {
      gpsMarker.setLatLng([lat, lon]);
    }

    // ROTATE
    setTimeout(function() {
      var boat = document.getElementById("boat");
      if (boat) {
        boat.style.transform = "rotate(" + heading + "deg)";
      }
    }, 50);

    // TRACK SAVE
    var point = [lat, lon];
    trackPoints.push(point);
    localStorage.setItem("track", JSON.stringify(trackPoints));

    if (trackLine) map.removeLayer(trackLine);
    trackLine = L.polyline(trackPoints, {color:'red'}).addTo(map);

    // 🔥 UPDATE ETA LIVE
    updateETA();

  }, function(err) {
    alert(err.message);
  }, {
    enableHighAccuracy: true
  });
}

// ===== CLICK ROUTE =====
map.on('click', function(e) {

  routePoints.push(e.latlng);

  if (routeLine) map.removeLayer(routeLine);
  routeLine = L.polyline(routePoints, {color:'blue'}).addTo(map);

  if (routePoints.length === 1) {
    startMarker = L.marker(e.latlng, {icon:startIcon}).addTo(map);
  }

  if (routePoints.length > 1) {
    if (endMarker) map.removeLayer(endMarker);

    endMarker = L.marker(e.latlng, {icon:finishIcon}).addTo(map);
  }

  updateETA();
});

// ===== DISTANCE =====
function calculateDistance(points) {
  var total = 0;
  for (var i = 1; i < points.length; i++) {
    total += map.distance(points[i-1], points[i]);
  }
  return total / 1000;
}

// ===== UPDATE ETA =====
function updateETA() {

  if (routePoints.length < 2 || !endMarker) return;

  var distance = calculateDistance(routePoints);

  var etaText = "Waiting for speed...";

  if (speed > 1) {
    var eta = distance / speed;
    var minutes = Math.round(eta * 60);
    etaText = minutes + " min";
  }

  endMarker.bindPopup(
    "🚩 FINISH<br>" +
    "Distance: " + distance.toFixed(2) + " km<br>" +
    "Speed: " + speed.toFixed(1) + " km/h<br>" +
    "ETA: " + etaText
  );
}

// ===== CLEAR =====
function clearManual() {
  routePoints = [];

  if (routeLine) map.removeLayer(routeLine);
  if (startMarker) map.removeLayer(startMarker);
  if (endMarker) map.removeLayer(endMarker);
}

// ===== SEARCH =====
function goToCoords() {
  var input = document.getElementById("coords").value;
  var parts = input.split(",");

  var lat = parseFloat(parts[0]);
  var lon = parseFloat(parts[1]);

  if (isNaN(lat) || isNaN(lon)) {
    alert("Invalid coordinates");
    return;
  }

  L.marker([lat, lon]).addTo(map);
  map.setView([lat, lon], 13);
}

</script>

</body>
</html>
