<!DOCTYPE html>
<html>
<head>
  <title>RS Plotter App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      height: 100%;
    }

    #btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="btn">📍 My Location</div>
<div id="map"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// START MAP (Western Cape)
var map = L.map('map').setView([-33.9, 18.4], 7);

// OFFLINE TILES (if available)
var offline = L.tileLayer('tiles/{z}/{x}/{y}.png', {
  minZoom: 7,
  maxZoom: 9
});

// ONLINE BACKUP (always works)
var online = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
});

// LOAD BOTH
offline.addTo(map);
online.addTo(map);

// GPS MARKER
var marker;

// BUTTON CLICK → GET LOCATION
document.getElementById("btn").onclick = function() {

  if (!navigator.geolocation) {
    alert("GPS not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {

    var lat = position.coords.latitude;
    var lon = position.coords.longitude;

    if (marker) {
      map.removeLayer(marker);
    }

    marker = L.marker([lat, lon]).addTo(map)
      .bindPopup("You are here")
      .openPopup();

    map.setView([lat, lon], 13);

  }, function(error) {
    alert("Location error: " + error.message);
  }, {
    enableHighAccuracy: true
  });

};

</script>

</body>
</html>
